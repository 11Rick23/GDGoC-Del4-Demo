name: code-review
on: [pull_request]

jobs:
  # TypeScriptのレビュー (ESLint)
  typescript-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: eslint
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: '.'

  # Pythonのレビュー (Ruff) - 修正版
  python-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: setup-reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # "." を追加してカレントディレクトリ以下のファイルを対象にする
          # 出力形式を明示的に指定
          ruff check . --output-format=rdjson | reviewdog -f=rdjson -reporter=github-pr-review -level=error